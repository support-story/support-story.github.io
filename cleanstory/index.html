<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanStory - 깨끗한 집을 위한 기록</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a1a;
      background: #f8f9fa;
      line-height: 1.6;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      padding: 20px 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #333;
      text-decoration: none;
    }
    .nav-links a {
      font-size: 14px;
      color: #666;
      text-decoration: none;
      margin-left: 24px;
      font-weight: 500;
    }
    .nav-links a:hover { color: #4A90D9; }
    .hero {
      text-align: center;
      padding: 80px 24px;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
    }
    .hero-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      object-fit: cover;
      margin: 0 auto 24px;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .hero .tagline {
      font-size: 18px;
      color: #666;
      margin-bottom: 32px;
    }
    .app-store-badge {
      display: inline-block;
      height: 50px;
      border-radius: 10px;
      background: #000;
      color: #fff;
      padding: 8px 20px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      line-height: 34px;
    }
    .features {
      padding: 60px 0;
    }
    .features h2 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 40px;
      color: #333;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }
    .feature-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .feature-card .icon {
      font-size: 36px;
      margin-bottom: 16px;
    }
    .feature-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .feature-card p {
      font-size: 14px;
      color: #666;
    }
    .links-section {
      padding: 40px 0 60px;
    }
    .links-section .container {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .links-section a {
      font-size: 15px;
      color: #4A90D9;
      text-decoration: none;
      font-weight: 600;
    }
    .links-section a:hover { text-decoration: underline; }
    .footer {
      text-align: center;
      padding: 40px 24px;
      color: #999;
      font-size: 14px;
      border-top: 1px solid #e9ecef;
    }
    .footer a { color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a class="logo" href="/">Support Story</a>
      <nav class="nav-links">
        <a href="/cleanstory/privacy.html">개인정보처리방침</a>
        <a href="/cleanstory/support.html">지원</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <img class="hero-icon" src="/images/cleanstory-icon.png" alt="CleanStory">
    <h1>CleanStory</h1>
    <p class="tagline">깨끗한 집을 위한 기록</p>
    <a class="app-store-badge" href="https://apps.apple.com/app/id6760124966">App Store에서 다운로드</a>
  </section>

  <section class="features">
    <div class="container">
      <h2>주요 기능</h2>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="icon">📋</div>
          <h3>청소 주기 관리</h3>
          <p>작업별 청소 주기를 설정하고 D-day로 한눈에 확인하세요</p>
        </div>
        <div class="feature-card">
          <div class="icon">👨‍👩‍👧‍👦</div>
          <h3>가족과 함께</h3>
          <p>공간에 가족을 초대하고 청소 현황을 함께 관리하세요</p>
        </div>
        <div class="feature-card">
          <div class="icon">🏠</div>
          <h3>구역별 관리</h3>
          <p>거실, 화장실, 주방 등 구역별로 작업을 분류하세요</p>
        </div>
        <div class="feature-card">
          <div class="icon">📊</div>
          <h3>청소 기록</h3>
          <p>누가, 언제 청소했는지 기록하고 과거 이력을 조회하세요</p>
        </div>
      </div>
    </div>
  </section>

  <section class="links-section">
    <div class="container">
      <a href="/cleanstory/privacy.html">개인정보처리방침</a>
      <a href="/cleanstory/support.html">고객 지원</a>
      <a href="mailto:story.support@gmail.com">문의하기</a>
    </div>
  </section>

  <footer class="footer">
    <p><a href="mailto:story.support@gmail.com">story.support@gmail.com</a></p>
  </footer>
</body>
</html>
