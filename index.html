<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Story</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a1a;
      background: #f8f9fa;
      line-height: 1.6;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      padding: 20px 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #333;
    }
    .hero {
      text-align: center;
      padding: 80px 24px;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
    }
    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .hero p {
      font-size: 17px;
      color: #666;
    }
    .apps {
      padding: 60px 0;
    }
    .apps h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: #333;
    }
    .app-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s;
    }
    .app-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .app-info h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .app-info p {
      font-size: 15px;
      color: #666;
      margin-bottom: 8px;
    }
    .app-link {
      font-size: 14px;
      color: #4A90D9;
      font-weight: 600;
    }
    .footer {
      text-align: center;
      padding: 40px 24px;
      color: #999;
      font-size: 14px;
      border-top: 1px solid #e9ecef;
    }
    .footer a {
      color: #666;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <span class="logo">Support Story</span>
    </div>
  </header>

  <section class="hero">
    <h1>일상을 더 깔끔하게</h1>
    <p>생활을 편리하게 만드는 앱을 만듭니다</p>
  </section>

  <section class="apps">
    <div class="container">
      <h2>Apps</h2>
      <a class="app-card" href="/cleanstory/">
        <img class="app-icon" src="/images/cleanstory-icon.png" alt="CleanStory">
        <div class="app-info">
          <h3>CleanStory</h3>
          <p>가족과 함께하는 청소 관리 앱. 청소 주기를 설정하고, 기록을 공유하세요.</p>
          <span class="app-link">자세히 보기 &rarr;</span>
        </div>
      </a>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 <a href="mailto:story.support@gmail.com">story.support@gmail.com</a></p>
  </footer>
</body>
</html>
